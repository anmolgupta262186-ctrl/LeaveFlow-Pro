<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<title>Add Employee</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap');

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#020617,#0f172a,#1d4ed8);
color:white;
}

.container{
width:450px;
padding:35px;
border-radius:22px;
background:rgba(255,255,255,0.08);
backdrop-filter:blur(15px);
box-shadow:0 20px 50px rgba(0,0,0,0.5);
}

h1{
text-align:center;
margin-bottom:25px;
font-size:34px;
font-weight:800;
color:#60a5fa;
}

input{
width:100%;
padding:14px;
margin:10px 0;
border:none;
outline:none;
border-radius:12px;
font-size:16px;
background:rgba(255,255,255,0.12);
color:white;
}

input::placeholder{
color:#cbd5e1;
}

button{
width:100%;
padding:14px;
margin-top:15px;
border:none;
border-radius:12px;
font-size:18px;
font-weight:600;
background:linear-gradient(90deg,#2563eb,#1d4ed8);
color:white;
cursor:pointer;
transition:0.3s;
}

button:hover{
transform:scale(1.03);
box-shadow:0 0 18px #3b82f6;
}

.back{
display:block;
text-align:center;
margin-top:18px;
text-decoration:none;
color:#93c5fd;
}
</style>
</head>

<body>

<div class="container">

<h1>➕ Add Employee</h1>

<form action="/saveEmployee" method="post" th:object="${employee}">
<input type="text" th:field="*{name}" placeholder="Enter Name">

<input type="text" th:field="*{email}" placeholder="Enter Email">

<input type="text" th:field="*{department}" placeholder="Enter Department">

<button type="submit">Save Employee</button>
</form>

<a href="/" class="back">⬅ Back to Home</a>

</div>

</body>
</html>
