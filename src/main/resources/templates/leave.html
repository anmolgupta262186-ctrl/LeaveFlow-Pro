<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<title>Apply Leave</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap');

*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#020617,#0f172a,#1d4ed8);
overflow:hidden;
color:white;
}

/* animated circles */
body::before, body::after{
content:'';
position:absolute;
width:300px;
height:300px;
border-radius:50%;
background:rgba(59,130,246,0.15);
animation:move 8s infinite alternate;
}

body::after{
right:50px;
bottom:50px;
animation-delay:2s;
}

@keyframes move{
from{transform:translateY(0);}
to{transform:translateY(-60px);}
}

.container{
position:relative;
z-index:2;
width:500px;
padding:35px;
border-radius:24px;
background:rgba(255,255,255,0.08);
backdrop-filter:blur(15px);
box-shadow:0 20px 50px rgba(0,0,0,0.5);
}

h1{
text-align:center;
margin-bottom:25px;
color:#60a5fa;
font-size:34px;
}

input{
width:100%;
padding:14px;
margin:10px 0;
border:none;
outline:none;
border-radius:12px;
background:rgba(255,255,255,0.12);
color:white;
}

button{
width:100%;
padding:14px;
margin-top:15px;
border:none;
border-radius:12px;
font-size:18px;
background:linear-gradient(90deg,#2563eb,#1d4ed8);
color:white;
cursor:pointer;
transition:0.3s;
}

button:hover{
transform:scale(1.03);
box-shadow:0 0 18px #3b82f6;
}

.popup{
display:none;
text-align:center;
margin-top:12px;
color:#22c55e;
font-weight:600;
}
</style>

<script>
function showPopup(){
document.getElementById("popup").style.display="block";
}
</script>

</head>

<body>

<div class="container">

<h1>📝 Apply Leave</h1>

<form action="/saveLeave" method="post" th:object="${leaveRequest}" onsubmit="showPopup()">

<input type="text" th:field="*{employeeName}" placeholder="Employee Name">

<input type="date" th:field="*{fromDate}">

<input type="date" th:field="*{toDate}">

<input type="text" th:field="*{reason}" placeholder="Reason for Leave">

<button type="submit">Submit Request</button>

</form>

<p id="popup" class="popup">✅ Leave Submitted Successfully!</p>

</div>

</body>
</html>
