<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<title>Dashboard</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap');

*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}

body{
padding:40px;
background:linear-gradient(135deg,#020617,#0f172a,#1d4ed8);
color:white;
min-height:100vh;
}

.container{
max-width:1150px;
margin:auto;
padding:30px;
border-radius:24px;
background:rgba(255,255,255,0.08);
backdrop-filter:blur(15px);
}

h1{
text-align:center;
margin-bottom:25px;
color:#60a5fa;
}

.stats{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:15px;
margin-bottom:25px;
}

.card{
padding:20px;
border-radius:16px;
text-align:center;
background:rgba(255,255,255,0.06);
font-size:20px;
font-weight:600;
}

table{
width:100%;
border-collapse:collapse;
}

th,td{
padding:14px;
text-align:center;
}

th{
background:#1e40af;
}

td{
background:rgba(255,255,255,0.04);
}

.action{
padding:8px 12px;
border-radius:8px;
text-decoration:none;
color:white;
font-size:14px;
margin:2px;
}

.approve{background:#16a34a;}
.reject{background:#dc2626;}
</style>
</head>

<body>

<div class="container">

<h1>📊 HR Dashboard</h1>

<div class="stats">
<div class="card">👨 Employees</div>
<div class="card">📝 Requests</div>
<div class="card">⚡ Fast HR</div>
</div>

<table>
<tr>
<th>ID</th>
<th>Name</th>
<th>From</th>
<th>To</th>
<th>Reason</th>
<th>Status</th>
<th>Action</th>
</tr>

<tr th:each="leave : ${leaves}">
<td th:text="${leave.id}"></td>
<td th:text="${leave.employeeName}"></td>
<td th:text="${leave.fromDate}"></td>
<td th:text="${leave.toDate}"></td>
<td th:text="${leave.reason}"></td>
<td th:text="${leave.status}"></td>

<td>
<a th:href="@{/approve/{id}(id=${leave.id})}" class="action approve">Approve</a>
<a th:href="@{/reject/{id}(id=${leave.id})}" class="action reject">Reject</a>
</td>

</tr>
</table>

</div>

</body>
</html>
