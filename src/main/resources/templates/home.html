<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<title>Employee Leave Management</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap');

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#020617,#0f172a,#1d4ed8);
overflow:hidden;
color:white;
}

.container{
width:470px;
padding:40px;
border-radius:25px;
background:rgba(255,255,255,0.08);
backdrop-filter:blur(15px);
box-shadow:0 20px 50px rgba(0,0,0,0.5);
text-align:center;
animation:fadeIn 1s ease;
}

h1{
font-size:44px;
font-weight:800;
line-height:1.1;
margin-bottom:12px;
background:linear-gradient(90deg,#60a5fa,#ffffff,#3b82f6);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
animation:glow 2s infinite alternate;
}

.sub{
font-size:15px;
color:#cbd5e1;
margin-bottom:28px;
}

a{
display:block;
text-decoration:none;
margin:16px 0;
padding:16px;
font-size:21px;
font-weight:600;
border-radius:14px;
color:white;
background:linear-gradient(90deg,#2563eb,#1d4ed8);
transition:0.35s ease;
box-shadow:0 8px 18px rgba(37,99,235,0.35);
}

a:hover{
transform:translateY(-4px) scale(1.03);
box-shadow:0 0 22px #3b82f6;
background:linear-gradient(90deg,#3b82f6,#2563eb);
}

.features{
margin-top:25px;
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
font-size:14px;
color:#dbeafe;
}

.feature-box{
padding:10px;
border-radius:12px;
background:rgba(255,255,255,0.05);
}

.footer{
margin-top:24px;
font-size:13px;
color:#93c5fd;
}

@keyframes glow{
from{filter:drop-shadow(0 0 8px #60a5fa);}
to{filter:drop-shadow(0 0 18px #3b82f6);}
}

@keyframes fadeIn{
from{opacity:0; transform:translateY(25px);}
to{opacity:1; transform:translateY(0);}
}
</style>
</head>

<body>

<div class="container">

<h1>LeaveFlow Pro</h1>
<p class="sub">Smart Employee Leave & Workforce Management System</p>

<a href="/employee">➕ Add Employee</a>
<a href="/leave">📝 Apply Leave</a>
<a href="/dashboard">📊 Dashboard</a>

<div class="features">
<div class="feature-box">⚡ Fast Approval</div>
<div class="feature-box">🔒 Secure Records</div>
<div class="feature-box">📅 Leave Tracking</div>
<div class="feature-box">📈 HR Dashboard</div>
</div>

<p class="footer">Built with Java Spring Boot • Modern HR Solution</p>

</div>

</body>
</html>
